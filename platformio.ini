; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = ststm32
board = nucleo_l476rg
framework = mbed
build_flags = 
	-std=gnu++2a
	-D PIO_FRAMEWORK_MBED_RTOS_PRESENT
	-D MBED_BUILD_PROFILE_PRODUCTION
build_unflags = 
	-fno-rtti
	-std=gnu++14
platform_packages = framework-mbed @ ~6.60600.201227

[env:debug]
platform = ststm32
board = nucleo_l476rg
framework = mbed
build_flags = 
	-std=gnu++2a
	-Wno-volatile
	-Wno-register
	-D MBED_BUILD_PROFILE_PRODUCTION
build_unflags = 
	-fno-rtti
	-std=gnu++11
	-std=gnu++14
	-std=gnu++17
platform_packages = 
	framework-mbed @ ~6.60600.201227
	toolchain-gccarmnoneeabi@13.3
[env:production]
build_flags = 
	-D NDEBUG